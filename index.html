<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kopi Ayu - Login</title>

  <link href='http://fonts.googleapis.com/css?family=Open+Sans:400,300,400italic,600,700' rel='stylesheet' type='text/css'>
  <link href='http://fonts.googleapis.com/css?family=Damion' rel='stylesheet' type='text/css'>
  
  <link href="css/bootstrap.min.css" rel="stylesheet">
  <link href="css/font-awesome.min.css" rel="stylesheet">
  <link href="css/templatemo-style.css" rel="stylesheet">
  <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon" />

  <style>
    /* Desain khusus halaman login agar rapi dan pas di tengah */
    body {
      background-color: #f4f4f4;
    }
    .login-section {
      padding: 70px 0;
    }
    .login-container {
      max-width: 430px;
      margin: 0 auto;
      padding: 40px;
      background: #ffffff;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .login-btn {
      background-color: #c7a17a;
      color: white;
      border: none;
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border-radius: 5px;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .login-btn:hover {
      background-color: #a8845f;
      color: white;
    }
    .form-group label {
      color: #7c5a36;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .form-control {
      height: 45px;
      border-radius: 5px;
    }
    .form-control:focus {
      border-color: #c7a17a;
      box-shadow: inset 0 1px 1px rgba(0,0,0,.075), 0 0 8px rgba(199, 161, 122, .6);
    }
  </style>
</head>
<body>
  
  <div class="tm-top-header">
    <div class="container">
      <div class="row">
        <div class="tm-top-header-inner">
          <div class="tm-logo-container">
            <img src="img/logo.png" alt="Logo" class="tm-site-logo">
            <h1 class="tm-site-name tm-handwriting-font">Kopi Ayu</h1>
          </div>
          <nav class="tm-nav">
            <ul>
              <li><a href="index.html">Beranda</a></li>
              <li><a href="today-special.html">Spesial Hari Ini</a></li>
              <li><a href="menu.html">Menu</a></li>
              <li><a href="contact.html">Kontak</a></li>
              <li><a href="login/index.html" class="active">Login</a></li>
            </ul>
          </nav>     
        </div>            
      </div>    
    </div>
  </div>

  <div class="tm-main-section light-gray-bg login-section">
    <div class="container">
      <div class="login-container">
        <h2 class="text-center gold-text tm-handwriting-font" style="font-size: 42px; margin-bottom: 25px; margin-top: 0;">Form Login</h2>
        
        <form id="loginForm">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" class="form-control" id="username" placeholder="Masukkan username" required>
          </div>
          <div class="form-group" style="margin-top: 20px;">
            <label for="password">Password</label>
            <input type="password" class="form-control" id="password" placeholder="Masukkan password" required>
          </div>
          <button type="submit" class="btn login-btn" style="margin-top: 30px;">Masuk</button>
        </form>
      </div>
    </div>
  </div>

  <footer>
    <div class="container text-center">
      <p class="small copyright-text" style="color: #777; margin: 40px 0;">Hak Cipta &copy; 2026 Kopi Ayu House</p>
    </div>
  </footer>

  <script type="text/javascript" src="js/jquery-1.11.2.min.js"></script>
  <script>
    $(document).ready(function() {
      // Menangkap aksi submit form login
      $('#loginForm').on('submit', function(e) {
        e.preventDefault(); // Mencegah halaman melakukan reload otomatis

        // Mengambil isi input dari user
        const inputUsername = $('#username').val();
        const inputPassword = $('#password').val();

        // Mengirim data menggunakan AJAX ke REST API sesuai panduan LKPD sekolah
        $.ajax({
          url: 'https://herisusanta.my.id/javalogin/api/',
          type: 'POST',
          dataType: 'json',
          contentType: 'application/json',
          data: JSON.stringify({
            username: inputUsername,
            password: inputPassword
          }),
          success: function(response) {
            // Jika login berhasil berdasarkan balasan dari server API
            if (response.status === 'success' || response.message === 'Login Berhasil') {
              alert('Selamat Datang ' + inputUsername + '! Login Berhasil.');
              
              // Jika login sukses, otomatis kembali ke halaman Beranda depan
              window.location.href = 'index.html';
            } else {
              alert('Login Gagal: ' + response.message);
            }
          },
          error: function(xhr, status, error) {
            // Jika akun salah atau terjadi kendala sistem jaringan
            if (xhr.responseJSON && xhr.responseJSON.message) {
              alert('Login Gagal: ' + xhr.responseJSON.message);
            } else {
              alert('Kombinasi salah atau gangguan jaringan. Silakan coba lagi.');
            }
          }
        });
      });
    });
  </script>
</body>
</html>
