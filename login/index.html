<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kopi Ayu - Masuk</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            
            <!-- Area konten utama form yang akan disembunyikan saat sukses -->
            <div id="loginContentArea">
                <!-- Header Form -->
                <div class="login-header">
                    <div class="neu-icon">
                        <div class="icon-inner">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                        </div>
                    </div>
                    <h2>Selamat Datang</h2>
                    <p>Silakan masuk menggunakan akun Anda</p>
                </div>
                
                <!-- Form Login -->
                <form class="login-form" id="loginForm" novalidate>
                    <!-- Input Username -->
                    <div class="form-group">
                        <div class="input-group neu-input">
                            <input type="text" id="username" name="username" required placeholder=" ">
                            <label for="username">Username</label>
                            <div class="input-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                    <circle cx="12" cy="7" r="4"/>
                                </svg>
                            </div>
                        </div>
                        <span class="error-message" id="usernameError"></span>
                    </div>

                    <!-- Input Password -->
                    <div class="form-group">
                        <div class="input-group neu-input password-group">
                            <input type="password" id="password" name="password" required placeholder=" ">
                            <label for="password">Password</label>
                            <div class="input-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                    <path d="M7 11V7a5 5 0 0110 0v4"/>
                                </svg>
                            </div>
                        </div>
                        <span class="error-message" id="passwordError"></span>
                    </div>

                    <!-- Tombol Masuk -->
                    <button type="submit" class="neu-button login-btn">
                        <span class="btn-text">Masuk</span>
                    </button>
                </form>
            </div>

            <!-- Area Notifikasi Sukses (Disembunyikan di awal, akan muncul di tengah card) -->
            <div class="success-message" id="successMessage" style="display: none;">
                <div class="success-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                </div>
                <h3>Login Anda Sudah Berhasil!</h3>
                <p>Mengalihkan ke halaman utama...</p>
            </div>

        </div>
    </div>

    <!-- Hubungkan ke file login.js -->
    <script src="js/login.js"></script>
</body>
</html>
